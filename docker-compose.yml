version: '3.8'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    volumes:
      - ./templates:/app/templates
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - REDIS_ADDR=redis:6379
      - MAILTRAP_HOST=sandbox.smtp.mailtrap.io
      - MAILTRAP_PORT=2525
      - MAILTRAP_USER=75e2da00872a40
      - MAILTRAP_PASS=075e768a542d2b
    depends_on:
      - redis