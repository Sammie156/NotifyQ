<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NotifyQ Dashboard</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: var(--font-sans, system-ui, sans-serif);
                background: var(--surface-0);
                color: var(--text-primary);
                min-height: 100vh;
                padding: 2rem;
            }

            header {
                margin-bottom: 2rem;
                padding-bottom: 1rem;
                border-bottom: 0.5px solid var(--border);
            }

            header h1 {
                font-size: 22px;
                font-weight: 500;
                color: var(--text-primary);
                letter-spacing: -0.3px;
            }

            header p {
                font-size: 13px;
                color: var(--text-muted);
                margin-top: 4px;
            }

            #stats {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                margin-bottom: 2rem;
            }

            #stats > div {
                background: var(--surface-1);
                border-radius: var(--radius);
                padding: 1rem;
            }

            #stats .stat-label {
                font-size: 12px;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 6px;
            }

            #stats .stat-value {
                font-size: 28px;
                font-weight: 500;
            }

            #pending-count {
                color: var(--text-warning);
            }
            #delivered-count {
                color: var(--text-success);
            }
            #failed-count {
                color: var(--text-danger);
            }

            .sections {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1.5rem;
            }

            section h2 {
                font-size: 13px;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--text-secondary);
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            section h2 .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                display: inline-block;
            }

            .pending h2 .dot {
                background: var(--fill-warning);
            }
            .delivered h2 .dot {
                background: var(--fill-success);
            }
            .failed h2 .dot {
                background: var(--fill-danger);
            }

            .card {
                background: var(--surface-2);
                border: 0.5px solid var(--border);
                border-radius: 12px;
                padding: 1rem 1.25rem;
                margin-bottom: 10px;
            }

            .card-recipient {
                font-size: 13px;
                font-weight: 500;
                color: var(--text-primary);
                margin-bottom: 4px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .card-subject {
                font-size: 13px;
                color: var(--text-secondary);
                margin-bottom: 8px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .card-meta {
                font-size: 11px;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .badge {
                display: inline-block;
                font-size: 11px;
                font-weight: 500;
                padding: 2px 8px;
                border-radius: 99px;
            }

            .badge-pending {
                background: var(--bg-warning);
                color: var(--text-warning);
            }

            .badge-delivered {
                background: var(--bg-success);
                color: var(--text-success);
            }

            .badge-failed {
                background: var(--bg-danger);
                color: var(--text-danger);
            }

            .badge-processing {
                background: var(--bg-accent);
                color: var(--text-accent);
            }

            .card-error {
                font-size: 11px;
                color: var(--text-danger);
                background: var(--bg-danger);
                border-radius: var(--radius);
                padding: 6px 8px;
                margin-top: 8px;
                word-break: break-all;
            }

            .empty {
                font-size: 13px;
                color: var(--text-muted);
                padding: 1.5rem 0;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>NotifyQ Dashboard</h1>
        </header>

        <div id="stats">
            <div>Pending <span id="pending-count">0</span></div>
            <div>Delivered <span id="delivered-count">0</span></div>
            <div>Failed <span id="failed-count">0</span></div>
        </div>

        <section class="pending">
            <h2>Pending Jobs</h2>
            <div id="pending-jobs"></div>
        </section>
        <section class="delivered">
            <h2>Delivered Jobs</h2>
            <div id="delivered-jobs"></div>
        </section>
        <section class="failed">
            <h2>Failed Jobs</h2>
            <div id="failed-jobs"></div>
        </section>

        <script>
            async function fetchJobs(endpoint, containerID, countID) {
                try {
                    const response = await fetch(endpoint);

                    if (!response.ok) {
                        throw new Error(`HTTP ERROR: ${response.status}`);
                    }

                    const data = await response.json();
                    const jobs = data.jobs;

                    if (jobs == null) {
                        let html = `<div class="card">
                        <p>No Jobs Present</p>
                    </div>`;

                        document.getElementById(containerID).innerHTML = html;
                        return;
                    }

                    let html = "";

                    jobs.forEach((job) => {
                        html += `<div class="card">
                      <p>${job.recipient}</p>
                      <p>Subject: ${job.subject} </p>
                      <p>Status: ${job.status} </p>
                      <p>Scheduled At: ${new Date(job.scheduled_at).toLocaleString()} </p>
                      ${job.last_error ? `<p>Error : ${job.last_error}</p>` : ""}
                  </div>`;
                    });

                    document.getElementById(containerID).innerHTML = html;
                    document.getElementById(countID).innerText = jobs.length;
                } catch (error) {
                    console.error(error);
                }
            }

            function loadDashboard() {
                fetchJobs("/jobs/pending", "pending-jobs", "pending-count");
                fetchJobs(
                    "/jobs/delivered",
                    "delivered-jobs",
                    "delivered-count",
                );
                fetchJobs("/jobs/failed", "failed-jobs", "failed-count");
            }

            loadDashboard();
            setInterval(loadDashboard, 10000);
        </script>
    </body>
</html>
