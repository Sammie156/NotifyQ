<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NotifyQ Dashboard</title>
        <style>
            /* Default: Dark Theme Colors */
            :root {
                --surface-0: #09090b;
                --surface-1: #18181b;
                --surface-2: #18181b;
                --border: #27272a;
                --radius: 8px;
                --text-primary: #f4f4f5;
                --text-secondary: #a1a1aa;
                --text-muted: #71717a;
                --text-warning: #fbbf24;
                --text-success: #34d399;
                --text-danger: #f87171;
                --fill-warning: #fbbf24;
                --fill-success: #34d399;
                --fill-danger: #f87171;
                --bg-warning: rgba(251, 191, 36, 0.1);
                --bg-success: rgba(52, 211, 153, 0.1);
                --bg-danger: rgba(248, 113, 113, 0.1);
                --bg-accent: rgba(59, 130, 246, 0.1);
                --text-accent: #60a5fa;
            }

            /* Light Theme Overrides */
            :root.light-mode {
                --surface-0: #fafafa;
                --surface-1: #ffffff;
                --surface-2: #ffffff;
                --border: #e4e4e7;
                --text-primary: #18181b;
                --text-secondary: #52525b;
                --text-muted: #a1a1aa;
                --text-warning: #d97706;
                --text-success: #16a34a;
                --text-danger: #dc2626;
                --fill-warning: #f59e0b;
                --fill-success: #10b981;
                --fill-danger: #ef4444;
                --bg-warning: #fef3c7;
                --bg-success: #d1fae5;
                --bg-danger: #fee2e2;
                --bg-accent: #eff6ff;
                --text-accent: #2563eb;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: var(--font-sans, system-ui, sans-serif);
                background: var(--surface-0);
                color: var(--text-primary);
                min-height: 100vh;
                padding: 2rem;
                transition:
                    background 0.2s ease,
                    color 0.2s ease;
            }

            header {
                margin-bottom: 2rem;
                padding-bottom: 1rem;
                border-bottom: 0.5px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            header h1 {
                font-size: 22px;
                font-weight: 500;
                color: var(--text-primary);
                letter-spacing: -0.3px;
            }

            /* Minimalist Theme Toggle Button */
            .theme-toggle {
                background: var(--surface-1);
                color: var(--text-primary);
                border: 0.5px solid var(--border);
                padding: 6px 12px;
                border-radius: 6px;
                font-size: 12px;
                font-family: inherit;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
                font-weight: 500;
            }

            .theme-toggle:hover {
                opacity: 0.9;
            }

            #stats {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                margin-bottom: 2rem;
            }

            #stats > div {
                background: var(--surface-1);
                border-radius: var(--radius);
                padding: 1rem;
                border: 0.5px solid var(--border);
                display: flex;
                flex-direction: column;
                gap: 4px;
                font-size: 12px;
                color: var(--text-secondary);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            #stats .stat-value {
                font-size: 28px;
                font-weight: 500;
            }

            #pending-count {
                color: var(--text-warning);
            }
            #delivered-count {
                color: var(--text-success);
            }
            #failed-count {
                color: var(--text-danger);
            }

            .sections {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1.5rem;
            }

            section h2 {
                font-size: 13px;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--text-secondary);
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            section h2 .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                display: inline-block;
            }

            .pending h2 .dot {
                background: var(--fill-warning);
            }
            .delivered h2 .dot {
                background: var(--fill-success);
            }
            .failed h2 .dot {
                background: var(--fill-danger);
            }

            .card {
                background: var(--surface-2);
                border: 0.5px solid var(--border);
                border-radius: 12px;
                padding: 1rem 1.25rem;
                margin-bottom: 10px;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
            }

            .card-recipient {
                font-size: 13px;
                font-weight: 500;
                color: var(--text-primary);
                margin-bottom: 4px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .card-subject {
                font-size: 13px;
                color: var(--text-secondary);
                margin-bottom: 8px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .card-meta {
                font-size: 11px;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .badge {
                display: inline-block;
                font-size: 11px;
                font-weight: 500;
                padding: 2px 8px;
                border-radius: 99px;
                text-transform: capitalize;
            }

            .badge-pending {
                background: var(--bg-warning);
                color: var(--text-warning);
            }
            .badge-delivered {
                background: var(--bg-success);
                color: var(--text-success);
            }
            .badge-failed {
                background: var(--bg-danger);
                color: var(--text-danger);
            }
            .badge-processing {
                background: var(--bg-accent);
                color: var(--text-accent);
            }

            .card-error {
                font-size: 11px;
                color: var(--text-danger);
                background: var(--bg-danger);
                border-radius: var(--radius);
                padding: 6px 8px;
                margin-top: 8px;
                word-break: break-all;
            }

            .empty {
                font-size: 13px;
                color: var(--text-muted);
                padding: 1.5rem 0;
                text-align: center;
                border: 0.5px dashed var(--border);
                border-radius: var(--radius);
            }
        </style>
    </head>
    <body>
        <header>
            <h1>NotifyQ Dashboard</h1>
            <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">
                <span>☼</span> Light Mode
            </button>
        </header>

        <div id="stats">
            <div>
                Pending <span id="pending-count" class="stat-value">0</span>
            </div>
            <div>
                Delivered <span id="delivered-count" class="stat-value">0</span>
            </div>
            <div>
                Failed <span id="failed-count" class="stat-value">0</span>
            </div>
        </div>

        <div class="sections">
            <section class="pending">
                <h2><span class="dot"></span>Pending Jobs</h2>
                <div id="pending-jobs"></div>
            </section>
            <section class="delivered">
                <h2><span class="dot"></span>Delivered Jobs</h2>
                <div id="delivered-jobs"></div>
            </section>
            <section class="failed">
                <h2><span class="dot"></span>Failed Jobs</h2>
                <div id="failed-jobs"></div>
            </section>
        </div>

        <script>
            // Theme toggling logic
            function toggleTheme() {
                const root = document.documentElement;
                const btn = document.getElementById("theme-btn");

                if (root.classList.contains("light-mode")) {
                    root.classList.remove("light-mode");
                    btn.innerHTML = `<span>☼</span> Light Mode`;
                } else {
                    root.classList.add("light-mode");
                    btn.innerHTML = `<span>☾</span> Dark Mode`;
                }
            }

            async function fetchJobs(endpoint, containerID, countID) {
                try {
                    const response = await fetch(endpoint);

                    if (!response.ok) {
                        throw new Error(`HTTP ERROR: ${response.status}`);
                    }

                    const data = await response.json();
                    const jobs = data.jobs;

                    if (!jobs || jobs.length === 0) {
                        document.getElementById(containerID).innerHTML =
                            `<div class="empty">No Jobs Present</div>`;
                        document.getElementById(countID).innerText = 0;
                        return;
                    }

                    let html = "";

                    jobs.forEach((job) => {
                        const dateFormatted = new Date(
                            job.scheduled_at,
                        ).toLocaleString();

                        let badgeClass = "badge-pending";
                        if (job.status === "delivered")
                            badgeClass = "badge-delivered";
                        if (job.status === "failed")
                            badgeClass = "badge-failed";
                        if (job.status === "processing")
                            badgeClass = "badge-processing";

                        html += `
                            <div class="card">
                                <div class="card-recipient">${job.recipient}</div>
                                <div class="card-subject">${job.subject}</div>
                                <div class="card-meta">
                                    <span class="badge ${badgeClass}">${job.status}</span>
                                    <span>${dateFormatted}</span>
                                </div>
                                ${job.last_error ? `<div class="card-error">Error: ${job.last_error}</div>` : ""}
                            </div>
                        `;
                    });

                    document.getElementById(containerID).innerHTML = html;
                    document.getElementById(countID).innerText = jobs.length;
                } catch (error) {
                    console.error(error);
                }
            }

            function loadDashboard() {
                fetchJobs("/jobs/pending", "pending-jobs", "pending-count");
                fetchJobs(
                    "/jobs/delivered",
                    "delivered-jobs",
                    "delivered-count",
                );
                fetchJobs("/jobs/failed", "failed-jobs", "failed-count");
            }

            loadDashboard();
            setInterval(loadDashboard, 10000);
        </script>
    </body>
</html>
